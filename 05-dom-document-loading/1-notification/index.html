<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <link rel="stylesheet" type="text/css" href="style.css">
    <title>NotificationMessage</title>
  </head>
  <body>

  <button id="btn1">Show simple message!</button>
  <script type="module">
    import NotificationMessage from './index.ts';

    btn1.addEventListener('click', () => {
      const notification = new NotificationMessage({
        message: 'Hello World',
        options: {
          duration: 2000,
          type: 'success'
        }
      });
      notification.show();
    });
  </script>

  </body>
</html>
